{% extends "base.html" %}

{% block title %}Sign In{% endblock %}

{% block content %}
  <div class="auth-page">
    <section class="card auth-card">
      <div class="panel-header">
        <div>
          <p class="eyebrow">Agent workspace</p>
          <h1>Sign in</h1>
          <p class="subtle">Access ticket triage, reply drafting, and approval workflows.</p>
        </div>
      </div>
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Sign in</button>
      </form>
    </section>
  </div>
{% endblock %}
